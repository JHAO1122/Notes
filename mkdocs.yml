site_name: My Study Notes
site_url: https://jhao1122.github.io/Notes/ 
repo_url: https://github.com/jhao1122/Notes   
repo_name: jhao1122/Notes

theme:
  name: material
  features:
    - navigation.tabs  
    - navigation.sections 
    - navigation.top 
    - search.suggest 
    - content.code.copy 
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        title: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        title: 切换到浅色模式
  language: zh 

extra_javascript:
  - javascripts/mathjax.js
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js
  
markdown_extensions:
  - admonition          
  - pymdownx.details    
  - pymdownx.superfences 
  - pymdownx.arithmatex: 
      generic: true

plugins:
  - search
  - i18n:
      default_language: zh
      languages:
        - locale: zh
          name: 中文
          default: true
          build: true
        - locale: en
          name: English
          build: true



extra:
  analytics:
    provider: google
    property: G-MPD6ZGWYW1  